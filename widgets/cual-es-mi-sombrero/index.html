<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identifica al Hacker · Hybridge X</title>

  <!-- Sistema de diseño Hybridge -->
  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/components.css">

  <!-- Estilos específicos del widget -->
  <link rel="stylesheet" href="widget.css">
</head>
<body>

<div class="wrap">

  <!-- Navegación de regreso -->
  <a href="../../index.html" class="nav-back">&larr; Volver al Laboratorio</a>

  <!-- Encabezado del widget -->
  <header class="widget-header">
    <span class="hb-overline">🛡️ Ciberseguridad</span>
    <h2 class="hb-h2">Identifica al Hacker</h2>
    <p class="hb-lead">Analiza las motivaciones y métodos en 5 escenarios reales para determinar si el actor es un sombrero blanco, gris o negro.</p>
  </header>

  <!-- Contenedor principal del juego -->
  <div class="hb-app-card">
    <hybridge-logo fill="#FFFFFF" width="90px" class="card-watermark"></hybridge-logo>

    <div class="game-topbar" id="game-topbar">
      <div class="hb-chip">
        🛡️ Puntos de defensa <span class="score-num" id="score-display">0</span>
      </div>
      <div class="lives-container" id="lives-display"></div>
    </div>

    <div class="progress-track" id="progress-track"></div>

    <div id="game-area"></div>

  </div>

</div>

<script>
// ── DATOS ──────────────────────────────────────────────────────────────────

const QUESTIONS = [
  {
    scenario: "Después de hackear los sistemas de cajeros automáticos de forma remota usando una laptop, este atacante trabajó con los fabricantes para resolver las vulnerabilidades de seguridad que encontró.",
    correct: "grey",
    feedback: {
      correct: "¡Correcto! Sombrero gris. Entró sin permiso (eso lo saca del white hat), pero luego reportó las fallas para que fueran corregidas — eso lo distingue del black hat. Zona gris total.",
      wrong:   "Incorrecto. La clave está en el combo: hackeo sin permiso + después colaboró para arreglarlo. Eso es terreno de sombrero gris — ni héroe ni villano."
    }
  },
  {
    scenario: "Este atacante transfirió $10 millones a su cuenta bancaria usando las credenciales y PINs de clientes que había recopilado ilegalmente.",
    correct: "black",
    feedback: {
      correct: "¡Exacto! Sombrero negro. Robo de credenciales + transferencia ilegal de fondos = delito claro. Motivación 100% maliciosa, cero autorización.",
      wrong:   "Te equivocaste. Aquí no hay ambigüedad: robar $10 millones con credenciales ajenas es un crimen. Este es el sombrero negro más clásico que existe."
    }
  },
  {
    scenario: "El trabajo de este atacante es identificar debilidades en el sistema informático de una empresa mediante simulaciones controladas.",
    correct: "white",
    feedback: {
      correct: "¡Bien hecho! Sombrero blanco. La palabra clave es 'trabajo' — tiene un contrato, un empleador, y hace esto dentro de la ley. Es un pentester profesional.",
      wrong:   "Incorrecto. La diferencia está en que es su trabajo — tiene autorización explícita. Eso es exactamente lo que define al white hat: hackear con permiso y de forma legal."
    }
  },
  {
    scenario: "Este atacante usó malware para comprometer el sistema de una empresa y robar información de tarjetas de crédito que luego vendió al mejor postor.",
    correct: "black",
    feedback: {
      correct: "¡Correcto! Sombrero negro. Malware + robo de datos + venta en mercado negro = motivación puramente criminal. Sin permiso, sin reporte, sin ética.",
      wrong:   "Incorrecto. Malware + venta de datos robados no deja margen de duda. Este es el perfil del criminal cibernético clásico: sombrero negro."
    }
  },
  {
    scenario: "Mientras realizaba una auditoría, este atacante encontró casualmente una vulnerabilidad de seguridad grave en la red de una organización a la que está autorizado a acceder.",
    correct: "white",
    feedback: {
      correct: "¡Excelente! Sombrero blanco. Aunque el descubrimiento fue accidental, la clave es que estaba autorizado a acceder a esa red. Reportar lo encontrado es lo que hace un white hat.",
      wrong:   "Te equivocaste. La palabra crucial es 'autorizado'. Tenía permiso para estar ahí. Cuando encuentras algo de forma legítima y lo reportas, eso es sombrero blanco."
    }
  }
];

const HATS = [
  { id: "white", label: "Sombrero Blanco", sub: "Hacker ético con permiso", icon: "🛡️" },
  { id: "grey",  label: "Sombrero Gris",   sub: "Sin permiso, sin daño",    icon: "🕵️" },
  { id: "black", label: "Sombrero Negro",  sub: "Atacante malicioso",       icon: "☠️" }
];

const POINTS_PER_Q = 200;

// ── ESTADO ─────────────────────────────────────────────────────────────────

let current  = 0;
let score    = 0;
let lives    = 3;
let answered = false;
let results  = [];

// ── RENDER: VIDAS ──────────────────────────────────────────────────────────

function buildLives() {
  const el = document.getElementById('lives-display');
  if (!el) return;
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('span');
    d.className   = 'life-emoji';
    d.textContent = i < lives ? '💚' : '💀';
    if (i >= lives) d.style.opacity = '0.5';
    el.appendChild(d);
  }
}

// ── RENDER: BARRA DE PROGRESO ──────────────────────────────────────────────

function buildProgress() {
  const el = document.getElementById('progress-track');
  if (!el) return;
  el.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    const isDone    = i < current || (i === current && answered);
    const isActive  = i === current && !answered;
    d.className = 'prog-segment'
      + (isActive ? ' active' : '')
      + (isDone   ? (results[i] ? ' done-correct' : ' done-wrong') : '');
    el.appendChild(d);
  });
}

// ── RENDER: PREGUNTA ───────────────────────────────────────────────────────

function renderQuestion() {
  answered = false;
  document.getElementById('game-topbar').style.display    = 'flex';
  document.getElementById('progress-track').style.display = 'flex';

  buildProgress();
  buildLives();

  const q    = QUESTIONS[current];
  const area = document.getElementById('game-area');

  area.innerHTML = `
    <div class="scenario-box">
      <span class="scenario-lbl">Escenario ${current + 1} de ${QUESTIONS.length}</span>
      <p class="scenario-text">"${q.scenario}"</p>
    </div>
    <div class="hat-grid" id="hat-grid">
      ${HATS.map(h => `
        <button class="hat-btn" data-id="${h.id}" onclick="selectHat('${h.id}')" tabindex="0">
          <span class="hat-icon">${h.icon}</span>
          <span class="hat-name">${h.label}</span>
          <span class="hat-desc">${h.sub}</span>
        </button>
      `).join('')}
    </div>
    <div id="feedback-area"></div>
  `;
}

// ── LÓGICA: SELECCIONAR SOMBRERO ───────────────────────────────────────────

function selectHat(id) {
  if (answered) return;
  answered = true;

  const q         = QUESTIONS[current];
  const isCorrect = id === q.correct;

  // Actualizar estados visuales de los botones
  document.querySelectorAll('.hat-btn').forEach(btn => {
    btn.disabled = true;
    const btnId  = btn.dataset.id;
    if (btnId === id)        btn.classList.add(isCorrect ? 'is-correct' : 'is-wrong');
    else if (btnId === q.correct) btn.classList.add('is-correct');
    else                     btn.classList.add('is-dimmed');
  });

  // Puntuación
  if (isCorrect) {
    score += POINTS_PER_Q;
    document.getElementById('score-display').textContent = score;
    results.push(true);
  } else {
    lives--;
    buildLives();
    results.push(false);
  }

  buildProgress();

  // Feedback
  const fb = document.getElementById('feedback-area');
  fb.innerHTML = `
    <div class="feedback-zone">
      <div class="hb-alert ${isCorrect ? 'hb-alert--success' : 'hb-alert--error'}">
        <span class="ico">${isCorrect ? '✅' : '❌'}</span>
        <div>
          <strong>${isCorrect ? '¡Acceso Concedido!' : 'Brecha de Seguridad'}</strong>
          ${isCorrect ? q.feedback.correct : q.feedback.wrong}
        </div>
      </div>
      <button class="hb-btn hb-btn-primary" onclick="advance()">
        ${current < QUESTIONS.length - 1 ? 'Siguiente escenario &rarr;' : 'Ver reporte final &rarr;'}
      </button>
    </div>
  `;
}

// ── LÓGICA: AVANZAR ────────────────────────────────────────────────────────

function advance() {
  current++;
  if (current >= QUESTIONS.length) showResults();
  else renderQuestion();
}

// ── RENDER: RESULTADOS FINALES ─────────────────────────────────────────────

function showResults() {
  document.getElementById('game-topbar').style.display    = 'none';
  document.getElementById('progress-track').style.display = 'none';

  const correct = results.filter(Boolean).length;
  const total   = QUESTIONS.length;

  let rank, rankSub;
  if (correct === 5)     { rank = "Maestro Sombrero Blanco"; rankSub = "Identificaste a todos los actores correctamente. Estás listo para unirte al equipo Red Team."; }
  else if (correct >= 3) { rank = "Analista en Formación";   rankSub = "Buen ojo para los patrones. Con un poco más de práctica serás un analista de seguridad excelente."; }
  else                   { rank = "Usuario en Riesgo";       rankSub = "Cuidado. La clave está en fijarse en los permisos y la motivación. Inténtalo de nuevo."; }

  const reviewHTML = QUESTIONS.map((q, i) => {
    const ok         = results[i];
    const correctHat = HATS.find(h => h.id === q.correct);
    return `
      <div class="review-item">
        <span class="review-badge ${ok ? 'ok' : 'no'}">${ok ? '✓' : '✗'}</span>
        <div class="review-text">
          "${q.scenario.substring(0, 65)}..."
          <span class="review-answer">${correctHat.icon} Era un ${correctHat.label}</span>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('game-area').innerHTML = `
    <div class="results-view">
      <div class="results-score-big">${score}</div>
      <span class="results-lbl">Puntos de Defensa Finales</span>

      <div class="results-rank">${rank}</div>
      <p class="results-sub">Aciertos: ${correct} de ${total} &nbsp;·&nbsp; ${rankSub}</p>

      <div class="review-list">${reviewHTML}</div>

      <button class="hb-btn hb-btn-primary" onclick="restartGame()">
        🔄 Repetir Simulación
      </button>
    </div>
  `;
}

// ── LÓGICA: REINICIAR ──────────────────────────────────────────────────────

function restartGame() {
  current  = 0;
  score    = 0;
  lives    = 3;
  answered = false;
  results  = [];
  document.getElementById('score-display').textContent = 0;
  renderQuestion();
}

// ── INIT ───────────────────────────────────────────────────────────────────

renderQuestion();
</script>

<!-- Web Component del logo -->
<script src="../../scripts/hybridge-logo.js"></script>

</body>
</html>
