<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGB Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e13;
      --surface: #111820;
      --border: #1e2d3d;
      --text: #cdd9e5;
      --muted: #4d6275;
      --r: 255;
      --g: 100;
      --b: 50;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .dot-row {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
    }

    .title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Color preview */
    .preview {
      width: 100%;
      height: 140px;
      border-radius: 12px;
      margin-bottom: 28px;
      transition: background 0.08s ease;
      position: relative;
      overflow: hidden;
    }

    .preview-pixels {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(4, 1fr);
      opacity: 0.08;
      pointer-events: none;
    }

    .px {
      border: 0.5px solid rgba(255,255,255,0.3);
    }

    .preview-label {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.35);
      padding: 4px 10px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }

    /* Sliders */
    .sliders {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 24px 1fr 48px;
      align-items: center;
      gap: 14px;
    }

    .channel-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
    }

    .channel-label.r { color: #ff6b6b; }
    .channel-label.g { color: #6bffb8; }
    .channel-label.b { color: #6bb8ff; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"].r-track {
      background: linear-gradient(to right,
        rgb(0, var(--g), var(--b)),
        rgb(255, var(--g), var(--b)));
    }
    input[type="range"].g-track {
      background: linear-gradient(to right,
        rgb(var(--r), 0, var(--b)),
        rgb(var(--r), 255, var(--b)));
    }
    input[type="range"].b-track {
      background: linear-gradient(to right,
        rgb(var(--r), var(--g), 0),
        rgb(var(--r), var(--g), 255));
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15), 0 2px 8px rgba(0,0,0,0.5);
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .channel-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-align: right;
    }

    /* Info panel */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-cell {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .info-cell-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .info-cell-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text);
    }

    /* Presets */
    .presets-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .preset-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
    }

    .preset-btn:hover {
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .preset-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* Hybridge badge */
    .hybridge-badge {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hybridge-colors {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hb-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .hb-chip:hover { border-color: rgba(255,255,255,0.25); }

    .hb-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .badge-label {
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="dot-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span class="title">rgb-explorer.html</span>
  </div>

  <div class="preview" id="preview">
    <div class="preview-pixels" id="pixels"></div>
    <span class="preview-label" id="previewLabel">rgb(255, 100, 50)</span>
  </div>

  <div class="sliders">
    <div class="slider-row">
      <span class="channel-label r">R</span>
      <input type="range" class="r-track" id="rSlider" min="0" max="255" value="255">
      <span class="channel-value" id="rVal">255</span>
    </div>
    <div class="slider-row">
      <span class="channel-label g">G</span>
      <input type="range" class="g-track" id="gSlider" min="0" max="255" value="100">
      <span class="channel-value" id="gVal">100</span>
    </div>
    <div class="slider-row">
      <span class="channel-label b">B</span>
      <input type="range" class="b-track" id="bSlider" min="0" max="255" value="50">
      <span class="channel-value" id="bVal">50</span>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-cell">
      <div class="info-cell-label">RGB</div>
      <div class="info-cell-value" id="infoRgb">rgb(255, 100, 50)</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">HEX</div>
      <div class="info-cell-value" id="infoHex">#FF6432</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Bits por canal</div>
      <div class="info-cell-value">8 bits</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Colores posibles</div>
      <div class="info-cell-value">16,777,216</div>
    </div>
  </div>

  <div class="presets-label">Colores rápidos</div>
  <div class="presets" id="presets"></div>

  <div class="hybridge-badge">
    <span class="badge-label">Colores Hybridge →</span>
    <div class="hybridge-colors">
      <div class="hb-chip" onclick="setColor(12,24,33)">
        <div class="hb-dot" style="background:rgb(12,24,33);border:1px solid #333"></div>
        Azul
      </div>
      <div class="hb-chip" onclick="setColor(226,248,151)">
        <div class="hb-dot" style="background:rgb(226,248,151)"></div>
        Amarillo
      </div>
    </div>
  </div>

</div>

<script>
  const rSlider = document.getElementById('rSlider');
  const gSlider = document.getElementById('gSlider');
  const bSlider = document.getElementById('bSlider');
  const rVal    = document.getElementById('rVal');
  const gVal    = document.getElementById('gVal');
  const bVal    = document.getElementById('bVal');
  const preview = document.getElementById('preview');
  const previewLabel = document.getElementById('previewLabel');
  const infoRgb = document.getElementById('infoRgb');
  const infoHex = document.getElementById('infoHex');
  const root    = document.documentElement;

  // Build pixel grid
  const pixelsEl = document.getElementById('pixels');
  for (let i = 0; i < 48; i++) {
    const px = document.createElement('div');
    px.className = 'px';
    pixelsEl.appendChild(px);
  }

  const presets = [
    { name: 'Rojo',     r: 220, g: 38,  b: 38  },
    { name: 'Verde',    r: 34,  g: 197, b: 94  },
    { name: 'Azul',     r: 59,  g: 130, b: 246 },
    { name: 'Amarillo', r: 250, g: 204, b: 21  },
    { name: 'Blanco',   r: 255, g: 255, b: 255 },
    { name: 'Negro',    r: 0,   g: 0,   b: 0   },
    { name: 'Cyan',     r: 6,   g: 182, b: 212 },
    { name: 'Naranja',  r: 249, g: 115, b: 22  },
  ];

  const presetsEl = document.getElementById('presets');
  presets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.innerHTML = `<span class="preset-swatch" style="background:rgb(${p.r},${p.g},${p.b})"></span>${p.name}`;
    btn.addEventListener('click', () => setColor(p.r, p.g, p.b));
    presetsEl.appendChild(btn);
  });

  function toHex(n) { return n.toString(16).toUpperCase().padStart(2, '0'); }

  function update() {
    const r = +rSlider.value;
    const g = +gSlider.value;
    const b = +bSlider.value;

    rVal.textContent = r;
    gVal.textContent = g;
    bVal.textContent = b;

    const rgb = `rgb(${r}, ${g}, ${b})`;
    const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;

    preview.style.background = rgb;
    previewLabel.textContent = rgb;
    infoRgb.textContent = rgb;
    infoHex.textContent = hex;

    root.style.setProperty('--r', r);
    root.style.setProperty('--g', g);
    root.style.setProperty('--b', b);

    // Update gradient tracks
    rSlider.style.background = `linear-gradient(to right, rgb(0,${g},${b}), rgb(255,${g},${b}))`;
    gSlider.style.background = `linear-gradient(to right, rgb(${r},0,${b}), rgb(${r},255,${b}))`;
    bSlider.style.background = `linear-gradient(to right, rgb(${r},${g},0), rgb(${r},${g},255))`;

    // Adaptive label color
    const luminance = 0.299*r + 0.587*g + 0.114*b;
    previewLabel.style.color = luminance > 180 ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.6)';
    previewLabel.style.background = luminance > 180 ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.35)';
  }

  function setColor(r, g, b) {
    rSlider.value = r;
    gSlider.value = g;
    bSlider.value = b;
    update();
  }

  rSlider.addEventListener('input', update);
  gSlider.addEventListener('input', update);
  bSlider.addEventListener('input', update);

  update();
</script>
</body>
</html>
