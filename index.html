<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybridge X — Widgets</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e13;
      color: #cdd9e5;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container { max-width: 640px; margin: 0 auto; }

    .top {
      margin-bottom: 40px;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #4d6275;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #e2f897;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #4d6275;
    }

    .widget-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .widget-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111820;
      border: 1px solid #1e2d3d;
      border-radius: 12px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.1s;
    }

    .widget-card:hover {
      border-color: rgba(226,248,151,0.3);
      transform: translateX(4px);
    }

    .widget-info { display: flex; flex-direction: column; gap: 4px; }

    .widget-name {
      font-size: 15px;
      font-weight: 600;
      color: #cdd9e5;
    }

    .widget-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #4d6275;
    }

    .widget-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid;
    }

    .tag-imagenes { color: #6bb8ff; border-color: rgba(107,184,255,0.3); background: rgba(107,184,255,0.07); }
    .tag-cyber    { color: #ff6b6b; border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.07); }
  </style>
</head>
<body>
<div class="container">
  <div class="top">
    <div class="eyebrow">Hybridge X 2.0 — Marco</div>
    <h1>Widgets interactivos</h1>
    <p class="subtitle">Herramientas de clase. Cada widget tiene su propia URL para embeber en la plataforma.</p>
  </div>

  <div class="widget-list">
    <a class="widget-card" href="widgets/rgb-explorer/">
      <div class="widget-info">
        <span class="widget-name">RGB Explorer</span>
        <span class="widget-meta">widgets/rgb-explorer/ · Imágenes 3</span>
      </div>
      <span class="widget-tag tag-imagenes">Imágenes</span>
    </a>
    <a class="widget-card" href="widgets/phishing-detector/">
      <div class="widget-info">
        <span class="widget-name">Detector de Phishing</span>
        <span class="widget-meta">widgets/phishing-detector/ · Ciberseguridad: Métodos de infiltración</span>
      </div>
      <span class="widget-tag tag-cyber">Ciberseguridad</span>
    </a>
    <!-- Aquí irán los nuevos widgets -->
  </div>
</div>
</body>
</html>
